<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lock Puzzle Solver</title>

    <style>
        body {
            font-family: Georgia, "Times New Roman", serif;
            color: #f5e7c8;
            margin: 0;
            padding: 30px;
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(255, 214, 140, 0.08), transparent 30%),
                linear-gradient(rgba(25, 15, 8, 0.72), rgba(25, 15, 8, 0.82)),
                linear-gradient(90deg,
                    #4b2f1d 0%,
                    #5a3820 8%,
                    #452917 16%,
                    #603c24 24%,
                    #4b2f1d 32%,
                    #5c3922 40%,
                    #462917 48%,
                    #5b3721 56%,
                    #4b2f1d 64%,
                    #5f3b23 72%,
                    #452816 80%,
                    #59371f 88%,
                    #4b2f1d 100%);
            background-attachment: fixed;
        }

        h1, h2, h3 {
            text-align: center;
            color: #f4dfb2;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        .side-image {
            position: fixed;
            top: 95px;
            width: 280px;
            max-height: calc(100vh - 130px);
            object-fit: contain;
            z-index: 5;
            border-radius: 10px;
            border: 2px solid #8a673d;
            box-shadow: 0 8px 28px rgba(0,0,0,0.55);
        }

        .left-pinned-image {
            left: 35px;
        }

        .right-pinned-image {
            right: 35px;
        }

        .logo-wrapper {
            display: flex;
            justify-content: center;
            margin: 10px auto 30px auto;
        }

        .top-logo {
            max-width: 900px;
            width: 90%;
            border-radius: 12px;
            border: 2px solid #8a673d;
            box-shadow: 0 8px 28px rgba(0,0,0,0.55);
        }

        .box {
            background:
                linear-gradient(rgba(68, 42, 24, 0.92), rgba(48, 29, 16, 0.94));
            padding: 20px;
            border-radius: 12px;
            max-width: 1200px;
            margin: 20px auto;
            border: 1px solid #8a673d;
            box-shadow:
                0 8px 24px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255, 231, 180, 0.08);
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 5px;
            color: #f0ddbb;
        }

        input, select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #9b7746;
            background: #1e140d;
            color: #f8ecd2;
            font-family: inherit;
        }

        input {
            width: 90px;
        }

        select {
            width: 150px;
        }

        button {
            margin-top: 20px;
            padding: 10px 16px;
            border: 1px solid #d0a35b;
            border-radius: 7px;
            cursor: pointer;
            background: linear-gradient(#8f6631, #6f4c24);
            color: #fff2d2;
            font-weight: bold;
            font-family: inherit;
            box-shadow: 0 3px 8px rgba(0,0,0,0.25);
        }

        button:hover {
            background: linear-gradient(#a77739, #7c5528);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        button:disabled:hover {
            background: linear-gradient(#8f6631, #6f4c24);
        }

        .pin-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .pin-card {
            background: linear-gradient(rgba(34, 21, 13, 0.96), rgba(44, 28, 18, 0.96));
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #7b5b35;
            box-shadow: inset 0 1px 0 rgba(255, 230, 180, 0.05);
        }

        .progress-text {
            color: #ead6ae;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }

        .step-navigation {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .wizard-table-wrapper {
            overflow-x: auto;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            color: #f5e7c8;
        }

        th, td {
            border: 1px solid #7e6039;
            padding: 8px;
            text-align: center;
        }

        th {
            background: rgba(33, 20, 12, 0.9);
            color: #f3dfb3;
        }

        td {
            background: rgba(64, 40, 24, 0.45);
        }

        .hint {
            color: #ead6ae;
            font-size: 0.98rem;
            line-height: 1.6;
        }

        pre {
            background: #1b120b;
            color: #f7edc9;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            white-space: pre-wrap;
            border: 1px solid #7f6038;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
        }

        .error {
            color: #ff9a8a;
            font-weight: bold;
        }

        .success {
            color: #c9f0a6;
            font-weight: bold;
        }

        @media (max-width: 1600px) {
            .side-image {
                display: none;
            }
        }
    </style>
</head>
<body>

    <img src="lockpick.png" alt="Lockpick Bild" class="side-image left-pinned-image">
    <img src="chest.png" alt="Truhen Bild" class="side-image right-pinned-image">

    <h1>Lock Puzzle Solver</h1>

    <div class="logo-wrapper">
        <img src="gothic.png" alt="Gothic Logo" class="top-logo">
    </div>

    <div class="box">
        <h2>Grunddaten</h2>

        <label for="blockCount">Anzahl an Blöcken:</label>
        <input id="blockCount" type="number" min="1" max="8" value="5">

        <br>

        <button onclick="generateMask()">Maske erstellen</button>
    </div>

    <div id="inputArea" class="box" style="display:none;"></div>

    <div id="resultArea" class="box" style="display:none;">
        <h2>Ergebnis</h2>
        <div id="status"></div>

        <h3>Genaue Lösung</h3>
        <pre id="solutionOutput"></pre>

        <h3>Kurzform</h3>
        <pre id="compactOutput"></pre>
    </div>

    <script>
        const HOLE_COUNT = 7;
        const TARGET_POSITION = 4;

        const OUTPUT_IS_MIRRORED = true;

        let puzzleState = {
            blockCount: 0,
            effects: [],
            currentRowIndex: 0
        };

        function generateMask() {
            const blockCount = readNumber("blockCount");
            const holeCount = HOLE_COUNT;
            const targetPosition = TARGET_POSITION;

            if (blockCount < 1) {
                alert("Die Anzahl der Blöcke muss mindestens 1 sein.");
                return;
            }

            if (blockCount > 8) {
                alert("Mehr als 8 Blöcke können sehr lange dauern. Bitte erstmal mit maximal 8 Blöcken arbeiten.");
                return;
            }

            puzzleState.blockCount = blockCount;
            puzzleState.effects = [];
            puzzleState.currentRowIndex = 0;

            for (let i = 0; i < blockCount; i++) {
                const row = [];

                for (let j = 0; j < blockCount; j++) {
                    const defaultValue = i === j ? 1 : 0;
                    row.push(defaultValue);
                }

                puzzleState.effects.push(row);
            }

            const inputArea = document.getElementById("inputArea");
            inputArea.style.display = "block";

            let html = "";

            html += "<h2>1. Aktuelle Pinpositionen</h2>";
            html += "<p class='hint'>Zähle die Löcher von links nach rechts. Bei 7 Löchern ist die Mitte Position 4.</p>";
            html += "<div class='pin-grid'>";

            for (let i = 0; i < blockCount; i++) {
                html += `
                    <div class="pin-card">
                        <label for="pos_${i}">B${i + 1} Position:</label>
                        <input id="pos_${i}" type="number" min="1" max="${holeCount}" value="${targetPosition}">
                    </div>
                `;
            }

            html += "</div>";

            html += "<h2>2. Wirkung beim Schieben nach rechts</h2>";
            html += `
                <p class="hint">
                    Trage reihenweise ein, was passiert, wenn du einen Block nach rechts bewegst.<br><br>
                    <strong>rechts</strong> bedeutet: betroffener Block bewegt sich nach rechts.<br>
                    <strong>links</strong> bedeutet: betroffener Block bewegt sich nach links.<br>
                    <strong>keine Bewegung</strong> bedeutet: betroffener Block bewegt sich nicht.<br><br>
                    Die Bewegung nach links wird automatisch gespiegelt.
                </p>
            `;

            html += `<div id="effectWizard"></div>`;

            inputArea.innerHTML = html;

            document.getElementById("resultArea").style.display = "none";

            renderEffectRow();
        }

        function renderEffectRow() {
            const wizard = document.getElementById("effectWizard");

            if (!wizard) {
                return;
            }

            const blockCount = puzzleState.blockCount;
            const currentRowIndex = puzzleState.currentRowIndex;

            let html = "";

            html += `<p class="progress-text">Reihe ${currentRowIndex + 1} von ${blockCount}</p>`;

            html += `<h3>B${currentRowIndex + 1} nach rechts</h3>`;

            html += `<div class="wizard-table-wrapper">`;
            html += `<table>`;
            html += `<tr>`;
            html += `<th>Aktion</th>`;

            for (let j = 0; j < blockCount; j++) {
                html += `<th>Wirkung auf B${j + 1}</th>`;
            }

            html += `</tr>`;
            html += `<tr>`;
            html += `<th>B${currentRowIndex + 1} nach rechts</th>`;

            for (let j = 0; j < blockCount; j++) {
                const currentValue = puzzleState.effects[currentRowIndex][j];

                html += `
                    <td>
                        <select id="rowEffect_${j}">
                            <option value="-1" ${currentValue === -1 ? "selected" : ""}>links</option>
                            <option value="0" ${currentValue === 0 ? "selected" : ""}>keine Bewegung</option>
                            <option value="1" ${currentValue === 1 ? "selected" : ""}>rechts</option>
                        </select>
                    </td>
                `;
            }

            html += `</tr>`;
            html += `</table>`;
            html += `</div>`;

            html += `
                <div class="step-navigation">
                    <button onclick="goToPreviousRow()" ${currentRowIndex === 0 ? "disabled" : ""}>Zurück</button>
            `;

            if (currentRowIndex < blockCount - 1) {
                html += `<button onclick="goToNextRow()">Weiter</button>`;
            } else {
                html += `<button onclick="solvePuzzle()">Lösung Berechnen</button>`;
            }

            html += `</div>`;

            wizard.innerHTML = html;
        }

        function saveCurrentRow() {
            const blockCount = puzzleState.blockCount;
            const currentRowIndex = puzzleState.currentRowIndex;

            for (let j = 0; j < blockCount; j++) {
                const select = document.getElementById(`rowEffect_${j}`);

                if (select) {
                    puzzleState.effects[currentRowIndex][j] = Number(select.value);
                }
            }
        }

        function goToNextRow() {
            saveCurrentRow();

            if (puzzleState.currentRowIndex < puzzleState.blockCount - 1) {
                puzzleState.currentRowIndex++;
                renderEffectRow();
            }
        }

        function goToPreviousRow() {
            saveCurrentRow();

            if (puzzleState.currentRowIndex > 0) {
                puzzleState.currentRowIndex--;
                renderEffectRow();
            }
        }

        function solvePuzzle() {
            saveCurrentRow();

            const blockCount = puzzleState.blockCount;
            const holeCount = HOLE_COUNT;
            const targetPosition = TARGET_POSITION;

            const startState = [];
            const goalState = [];

            for (let i = 0; i < blockCount; i++) {
                const position = readNumber(`pos_${i}`);

                if (position < 1 || position > holeCount) {
                    showError(`B${i + 1} hat eine ungültige Position. Erlaubt sind nur 1 bis 7.`);
                    return;
                }

                startState.push(position);
                goalState.push(targetPosition);
            }

            const effects = puzzleState.effects;

            const solution = bfsSolve(startState, goalState, effects, holeCount);

            if (!solution.found) {
                showError(solution.message);
                return;
            }

            showSolution(solution.steps);
        }

        function bfsSolve(startState, goalState, effects, holeCount) {
            const startKey = stateToKey(startState);
            const goalKey = stateToKey(goalState);

            if (startKey === goalKey) {
                return {
                    found: true,
                    steps: []
                };
            }

            const queue = [startState];
            let queueIndex = 0;

            const visited = new Map();

            visited.set(startKey, {
                previous: null,
                action: null
            });

            const maxCheckedStates = 1000000;
            let checkedStates = 0;

            while (queueIndex < queue.length) {
                const currentState = queue[queueIndex];
                queueIndex++;
                checkedStates++;

                if (checkedStates > maxCheckedStates) {
                    return {
                        found: false,
                        message: "Abbruch: Zu viele mögliche Zustände. Versuche weniger Blöcke oder prüfe die Eingaben."
                    };
                }

                for (let blockIndex = 0; blockIndex < effects.length; blockIndex++) {
                    for (const direction of [1, -1]) {
                        const nextState = applyMove(currentState, effects[blockIndex], direction, holeCount);

                        if (nextState === null) {
                            continue;
                        }

                        const nextKey = stateToKey(nextState);

                        if (visited.has(nextKey)) {
                            continue;
                        }

                        const actionText = buildActionText(blockIndex, direction);

                        visited.set(nextKey, {
                            previous: stateToKey(currentState),
                            action: actionText
                        });

                        if (nextKey === goalKey) {
                            return {
                                found: true,
                                steps: reconstructSteps(visited, startKey, goalKey)
                            };
                        }

                        queue.push(nextState);
                    }
                }
            }

            return {
                found: false,
                message: "Keine Lösung gefunden. Prüfe die Pinpositionen und die Bewegungswirkungen."
            };
        }

        function applyMove(state, effectRow, direction, holeCount) {
            const nextState = [];

            for (let i = 0; i < state.length; i++) {
                const nextPosition = state[i] + effectRow[i] * direction;

                if (nextPosition < 1 || nextPosition > holeCount) {
                    return null;
                }

                nextState.push(nextPosition);
            }

            return nextState;
        }

        function buildActionText(blockIndex, direction) {
            let directionText;

            if (OUTPUT_IS_MIRRORED) {
                directionText = direction === 1 ? "links" : "rechts";
            } else {
                directionText = direction === 1 ? "rechts" : "links";
            }

            return `B${blockIndex + 1} nach ${directionText}`;
        }

        function reconstructSteps(visited, startKey, goalKey) {
            const steps = [];
            let currentKey = goalKey;

            while (currentKey !== startKey) {
                const data = visited.get(currentKey);
                steps.push(data.action);
                currentKey = data.previous;
            }

            steps.reverse();
            return steps;
        }

        function showSolution(steps) {
            const resultArea = document.getElementById("resultArea");
            const status = document.getElementById("status");
            const solutionOutput = document.getElementById("solutionOutput");
            const compactOutput = document.getElementById("compactOutput");

            resultArea.style.display = "block";

            if (steps.length === 0) {
                status.innerHTML = "<p class='success'>Das Schloss ist bereits gelöst.</p>";
                solutionOutput.textContent = "";
                compactOutput.textContent = "";
                return;
            }

            status.innerHTML = `<p class='success'>Lösung gefunden mit ${steps.length} Bewegungen.</p>`;

            let exactText = "";

            for (let i = 0; i < steps.length; i++) {
                exactText += `${i + 1}. ${steps[i]}\n`;
            }

            solutionOutput.textContent = exactText;
            compactOutput.textContent = buildCompactText(steps);

            resultArea.scrollIntoView({
                behavior: "smooth"
            });
        }

        function buildCompactText(steps) {
            if (steps.length === 0) {
                return "";
            }

            const groups = [];
            let currentAction = steps[0];
            let count = 1;

            for (let i = 1; i < steps.length; i++) {
                if (steps[i] === currentAction) {
                    count++;
                } else {
                    groups.push({
                        action: currentAction,
                        count: count
                    });

                    currentAction = steps[i];
                    count = 1;
                }
            }

            groups.push({
                action: currentAction,
                count: count
            });

            let text = "";

            for (const group of groups) {
                if (group.count === 1) {
                    text += `${group.action}\n`;
                } else {
                    text += `${group.action} x${group.count}\n`;
                }
            }

            return text;
        }

        function showError(message) {
            const resultArea = document.getElementById("resultArea");
            const status = document.getElementById("status");
            const solutionOutput = document.getElementById("solutionOutput");
            const compactOutput = document.getElementById("compactOutput");

            resultArea.style.display = "block";
            status.innerHTML = `<p class='error'>${message}</p>`;
            solutionOutput.textContent = "";
            compactOutput.textContent = "";

            resultArea.scrollIntoView({
                behavior: "smooth"
            });
        }

        function readNumber(id) {
            return Number(document.getElementById(id).value);
        }

        function stateToKey(state) {
            return state.join(",");
        }
    </script>

</body>
</html>
